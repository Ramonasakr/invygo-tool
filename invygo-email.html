<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invygo · Car Grid Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#159fcb; --blue-dark:#0d7fa3; --blue-light:#e8f7fc;
  --navy:#0d2d3d; --soft:#f4f9fb; --border:#daedf5;
  --muted:#7a8fa0; --text:#0d2d3d; --white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#e2eff5;min-height:100vh;color:var(--text);}

/* ── SHELL ── */
.app{display:grid;grid-template-columns:360px 1fr;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{background:#fff;border-right:1px solid var(--border);height:100vh;position:sticky;top:0;display:flex;flex-direction:column;overflow:hidden;}
.sidebar-top{padding:18px 22px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.slogo{font-family:'Sora',sans-serif;font-size:18px;font-weight:800;color:var(--blue);letter-spacing:-0.02em;}
.slogo sub{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;vertical-align:middle;margin-left:6px;}
.sbody{flex:1;overflow-y:auto;padding:14px 18px 80px;}
.sbody::-webkit-scrollbar{width:3px;}
.sbody::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.sec{font-family:'Sora',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:18px 0 8px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

.fg{margin-bottom:8px;}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.fg input,.fg select{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 11px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:var(--text);background:var(--soft);outline:none;transition:border-color .15s,background .15s;}
.fg input:focus,.fg select:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(21,159,203,.1);}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}

.cslot{background:var(--soft);border:1.5px solid var(--border);border-radius:12px;padding:12px 13px;margin-bottom:9px;transition:border-color .2s;}
.cslot:focus-within{border-color:var(--blue);background:#fafdff;box-shadow:0 0 0 3px rgba(21,159,203,.07);}
.cslot-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cslot-num{font-family:'Sora',sans-serif;font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.1em;}
.cslot-st{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.cslot-st.ok{color:#22a06b;}
.rmbtn{background:none;border:none;cursor:pointer;color:#c0cdd6;font-size:13px;padding:0;line-height:1;}
.rmbtn:hover{color:#e05;}
.upbtn{width:100%;border:1.5px dashed var(--border);border-radius:7px;padding:7px;background:#fff;color:var(--muted);font-size:11px;font-family:'Sora',sans-serif;font-weight:600;letter-spacing:.04em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;margin-top:6px;}
.upbtn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light);}
.upbtn.ok{border-style:solid;border-color:#22a06b;color:#22a06b;background:#f0faf5;}
input[type="file"]{display:none;}
.addbtn{width:100%;border:1.5px dashed #b0cdd8;border-radius:8px;padding:8px;background:transparent;color:#7a8fa0;font-size:11px;font-family:'Sora',sans-serif;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;margin-top:2px;}
.addbtn:hover{border-color:var(--blue);color:var(--blue);}

/* ── USP editor rows ── */
.usp-row{display:flex;gap:6px;align-items:center;margin-bottom:7px;}
.usp-row select{flex:0 0 100px;border:1.5px solid var(--border);border-radius:8px;padding:6px 8px;font-size:11px;font-family:inherit;background:var(--soft);color:var(--text);outline:none;}
.usp-row input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:6px 9px;font-size:12px;font-family:inherit;background:var(--soft);outline:none;color:var(--text);}
.usp-row input.sub{font-size:11px;}
.usp-row input:focus,.usp-row select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,159,203,.1);}

/* ── MAIN ── */
.main{padding:28px 24px 60px;display:flex;flex-direction:column;align-items:center;}
.main-hd{width:100%;max-width:460px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.prev-lbl{font-family:'Sora',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);}
.dlbtn{background:var(--blue);color:#fff;border:none;border-radius:50px;padding:9px 20px;font-family:'Sora',sans-serif;font-size:12px;font-weight:700;letter-spacing:.04em;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .18s;box-shadow:0 4px 14px rgba(21,159,203,.3);}
.dlbtn:hover{background:var(--blue-dark);transform:translateY(-1px);}
.dlbtn:disabled{opacity:.65;cursor:not-allowed;transform:none;}

/* ══════════════════════════════
   POSTER
══════════════════════════════ */
#poster{
  width:460px;
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(13,45,61,.14),0 4px 18px rgba(0,0,0,.07);
  position:relative;
}

/* ── Background decoration ── */
.bg-deco{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  pointer-events:none;
  overflow:hidden;
  border-radius:20px;
}
.bg-deco svg{position:absolute;top:0;left:0;width:100%;height:100%;}

/* ── Header ── */
.ph{padding:22px 22px 12px;position:relative;z-index:1;}
.ph-toprow{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.ph-logo{display:flex;flex-direction:column;align-items:flex-start;gap:1px;}
.ph-logo-name{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;color:var(--blue);letter-spacing:-.03em;line-height:1;}
.ph-logo-tag{font-size:9px;color:var(--muted);letter-spacing:.01em;}
.ph-sf{display:flex;flex-direction:column;align-items:flex-end;gap:0;}
.ph-sf-lbl{font-family:'Sora',sans-serif;font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.ph-sf-price{display:flex;align-items:baseline;gap:1px;line-height:1;}
.ph-sf-cur{font-family:'Sora',sans-serif;font-size:13px;font-weight:800;color:var(--blue);}
.ph-sf-num{font-family:'Sora',sans-serif;font-size:34px;font-weight:800;color:var(--blue);line-height:1;}
.ph-sf-mo{font-family:'Sora',sans-serif;font-size:13px;font-weight:600;color:var(--muted);}
.ph-headline{font-family:'Sora',sans-serif;font-size:30px;font-weight:800;color:var(--navy);line-height:1.1;}
.ph-headline .hl{color:var(--blue);display:block;}

/* ── Car grid ── */
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:12px 14px;position:relative;z-index:1;}
.pc{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.pc-img{
  width:100%;
  height:86px;
  background:var(--soft);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  position:relative;
}
/* THE FIX: use a real <img> styled so it cannot stretch */
.pc-img img{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  object-fit:contain;    /* never distort */
  object-position:center;
  display:block;
}
.pc-ph{display:flex;flex-direction:column;align-items:center;gap:3px;color:#a8c8d8;}
.pc-ph svg{opacity:.5;}
.pc-ph span{font-size:8px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;}
.pc-info{padding:7px 9px 9px;}
.pc-name{font-family:'Sora',sans-serif;font-size:11px;font-weight:700;color:var(--navy);margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-meta{font-size:9.5px;color:var(--muted);margin-bottom:4px;}
.pc-price{display:flex;align-items:baseline;gap:1px;}
.pc-price-cur{font-family:'Sora',sans-serif;font-size:11px;font-weight:800;color:var(--blue);}
.pc-price-num{font-family:'Sora',sans-serif;font-size:15px;font-weight:800;color:var(--blue);line-height:1;}
.pc-price-mo{font-size:9px;color:var(--muted);font-weight:500;margin-left:1px;}

/* ── USPs row ── */
.pusps{
  display:flex;
  justify-content:center;
  gap:0;
  padding:10px 14px;
  border-top:1px solid var(--border);
  position:relative;z-index:1;
}
.pusp{
  display:flex;flex-direction:column;align-items:center;
  flex:1;
  padding:6px 4px;
  text-align:center;
}
.pusp-icon{
  width:34px;height:34px;
  border:1.5px solid var(--blue);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:5px;
  background:#fff;
  flex-shrink:0;
}
.pusp-icon svg{stroke:var(--blue);}
.pusp-title{font-family:'Sora',sans-serif;font-size:9.5px;font-weight:700;color:var(--navy);line-height:1.2;margin-bottom:1px;}
.pusp-sub{font-size:8.5px;color:var(--muted);line-height:1.3;}

/* ── Badges — centred ── */
.pf{
  padding:8px 14px 10px;
  border-top:1px solid var(--border);
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:center;   /* ← centred */
  position:relative;z-index:1;
}
.pf-badge{background:var(--blue-light);color:var(--blue-dark);border-radius:50px;padding:4px 11px;font-family:'Sora',sans-serif;font-size:9px;font-weight:700;letter-spacing:.04em;white-space:nowrap;}

/* ── CTA ── */
.pcta{padding:10px 18px 20px;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;}
.pcta-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:50px;padding:13px;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;letter-spacing:.03em;cursor:default;box-shadow:0 4px 16px rgba(21,159,203,.3);text-align:center;}
.pcta-tc{text-align:center;font-size:9.5px;color:var(--muted);margin-top:7px;font-style:italic;}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--navy);color:#fff;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;padding:9px 20px;border-radius:50px;opacity:0;pointer-events:none;transition:all .28s ease;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">
  <div class="sidebar-top" style="display:flex;align-items:center;gap:8px;">
    <img id="sb-logo" src="" alt="invygo" style="height:20px;display:block;background:transparent;">
  </div>
  <div class="sbody">

    <div class="sec">Header</div>
    <div class="fg"><label>Headline line 1</label><input id="f-h1" value="Find your" oninput="render()"></div>
    <div class="fg"><label>Headline line 2 (blue)</label><input id="f-h2" value="perfect drive" oninput="render()"></div>
    <div class="r2">
      <div class="fg"><label>Starting price</label><input id="f-price" value="1,899" oninput="render()"></div>
      <div class="fg"><label>Currency</label>
        <select id="f-cur" onchange="render()">
          <option value="SAR" selected>SAR</option>
          <option value="AED">AED</option>
          <option value="USD">USD</option>
          <option value="QAR">QAR</option>
          <option value="BHD">BHD</option>
        </select>
      </div>
    </div>
    <div class="fg"><label>CTA button text</label><input id="f-cta" value="Subscribe now" oninput="render()"></div>
    <div class="fg"><label>T&amp;C note</label><input id="f-tc" value="*Standard T&Cs apply · Prices from 3-month rental" oninput="render()"></div>

    <div class="sec">USPs (icons)</div>
    <div id="usp-list"></div>
    <button class="addbtn" onclick="addUsp()">
      <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Add USP
    </button>

    <div class="sec">Badges</div>
    <div id="badges-list"></div>
    <button class="addbtn" onclick="addBadge()">
      <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Add badge
    </button>

    <div class="sec">Cars</div>
    <div id="car-slots"></div>
    <button class="addbtn" onclick="addCar()">
      <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Add car
    </button>

  </div>
</aside>

<!-- ══ MAIN ══ -->
<main class="main">
  <div class="main-hd">
    <span class="prev-lbl">Live preview</span>
    <button class="dlbtn" id="dl-btn" onclick="downloadPoster()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Download PNG
    </button>
  </div>

  <div id="poster">
    <div style="position:absolute;pointer-events:none;z-index:0;width:330px;height:330px;right:-85px;bottom:-85px;"><img id="bg-icon-img" src="" alt="" style="width:100%;height:100%;object-fit:contain;opacity:.04;background:transparent;"></div>
    <!-- background SVG decorations -->
    <div class="bg-deco">
      <svg viewBox="0 0 460 800" preserveAspectRatio="xMidYMid slice" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="440" cy="30" r="120" stroke="rgba(21,159,203,0.08)" stroke-width="1" fill="none"/>
        <circle cx="440" cy="30" r="160" stroke="rgba(21,159,203,0.05)" stroke-width="1" fill="none"/>
        <circle cx="440" cy="30" r="200" stroke="rgba(21,159,203,0.03)" stroke-width="1" fill="none"/>
        <circle cx="10" cy="780" r="90"  stroke="rgba(21,159,203,0.06)" stroke-width="1" fill="none"/>
        <circle cx="10" cy="780" r="125" stroke="rgba(21,159,203,0.04)" stroke-width="1" fill="none"/>
        <circle cx="60" cy="30" r="2.5" fill="rgba(21,159,203,0.15)"/>
        <circle cx="80" cy="18" r="2"   fill="rgba(21,159,203,0.12)"/>
        <circle cx="95" cy="35" r="1.5" fill="rgba(21,159,203,0.10)"/>
        <circle cx="50" cy="50" r="2"   fill="rgba(21,159,203,0.10)"/>
      </svg>
    </div>

    <div class="ph">
      <div class="ph-toprow">
        <div class="ph-logo" style="background:transparent;line-height:0;"><img id="p-logo" src="" alt="invygo" style="height:28px;display:block;background:transparent;"></div>
        <div class="ph-sf">
          <span class="ph-sf-lbl">Starting from</span>
          <div class="ph-sf-price">
            <span class="ph-sf-cur" id="p-cur">SAR</span>
            <span class="ph-sf-num" id="p-price">1,899</span>
            <span class="ph-sf-mo">/m</span>
          </div>
        </div>
      </div>
      <div class="ph-headline">
        <span id="p-h1">Find your</span>
        <span class="hl" id="p-h2">perfect drive</span>
      </div>
    </div>

    <div class="pg" id="p-grid"></div>
    <div class="pusps" id="p-usps"></div>
    <div class="pf" id="p-footer"></div>
    <div class="pcta">
      <div class="pcta-btn" id="p-cta">Subscribe now</div>
      <div class="pcta-tc" id="p-tc">*Standard T&Cs apply · Prices from 3-month rental</div>
    </div>
  </div>
</main>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
/* ═══════════ STATE ═══════════ */
let cars = [
  {name:'MG5',          year:'2026',type:'Sedan',price:'1,199',img:null},
  {name:'Kaiyi X3 Pro', year:'2026',type:'SUV',  price:'1,580',img:null},
  {name:'MG ZS',        year:'2026',type:'SUV',  price:'1,599',img:null},
  {name:'Geely Coolray',year:'2026',type:'SUV',  price:'1,709',img:null},
  {name:'MG RX5',       year:'2026',type:'SUV',  price:'1,830',img:null},
  {name:'Nissan Sunny', year:'2026',type:'Sedan',price:'1,130',img:null},
  {name:'Geely Emgrand',year:'2026',type:'Sedan',price:'1,899',img:null},
  {name:'Toyota Yaris', year:'2026',type:'Sedan',price:'1,470',img:null},
  {name:'Haval Jolion', year:'2026',type:'SUV',  price:'1,720',img:null},
];

let badges = ['No deposit','Insurance included','Maintenance included','Cancel anytime'];

/* icon keys + their SVG paths */
const ICONS = {
  shield:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>`,
  calendar: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>`,
  nobank:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M4.5 4.5l15 15"/></svg>`,
  switch:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke="currentColor"><path d="M17 4l3 3-3 3"/><path d="M20 7H4"/><path d="M7 20l-3-3 3-3"/><path d="M4 17h16"/></svg>`,
  heart:    `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
  star:     `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
  check:    `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke="currentColor"><path d="M20 6L9 17l-5-5"/></svg>`,
  car:      `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke="currentColor"><path d="M5 17H3a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>`,
};

let usps = [
  {icon:'shield',  title:'All inclusive',      sub:'Insurance & maintenance'},
  {icon:'calendar',title:'Flexible plans',     sub:'From 1 month+'},
  {icon:'nobank',  title:'No bank loans',      sub:'No long term commitment'},
  {icon:'switch',  title:'Switch cars anytime',sub:'Change whenever you want'},
];

/* ═══════════ RENDER POSTER ═══════════ */
function render() {
  const cur   = document.getElementById('f-cur').value;
  const price = document.getElementById('f-price').value;
  document.getElementById('p-cur').textContent   = cur;
  document.getElementById('p-price').textContent = price;
  document.getElementById('p-h1').textContent    = document.getElementById('f-h1').value;
  document.getElementById('p-h2').textContent    = document.getElementById('f-h2').value;
  document.getElementById('p-cta').textContent   = document.getElementById('f-cta').value;
  document.getElementById('p-tc').textContent    = document.getElementById('f-tc').value;

  /* car grid */
  document.getElementById('p-grid').innerHTML = cars.map(c => `
    <div class="pc">
      <div class="pc-img">
        ${c.img
          ? `<img src="${c.img}" alt="${c.name}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;object-position:center;display:block;">`
          : `<div class="pc-ph">
               <svg width="38" height="22" viewBox="0 0 38 22" fill="none">
                 <rect x="1" y="6" width="36" height="13" rx="3" fill="#c8dfe8"/>
                 <ellipse cx="9" cy="19" rx="3.5" ry="2.8" fill="#a8c4d0"/>
                 <ellipse cx="29" cy="19" rx="3.5" ry="2.8" fill="#a8c4d0"/>
                 <path d="M5 6L10 1.5L28 1.5L33 6" stroke="#a8c4d0" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
               </svg>
               <span>upload</span>
             </div>`}
      </div>
      <div class="pc-info">
        <div class="pc-name">${c.name||'—'}</div>
        <div class="pc-meta">${c.year}${c.type?' – '+c.type:''}</div>
        <div class="pc-price">
          <span class="pc-price-cur">${cur}</span>
          <span class="pc-price-num">${c.price||'—'}</span>
          <span class="pc-price-mo">/m</span>
        </div>
      </div>
    </div>`).join('');

  /* USPs */
  document.getElementById('p-usps').innerHTML = usps.map(u => `
    <div class="pusp">
      <div class="pusp-icon">${ICONS[u.icon]||ICONS.shield}</div>
      <div class="pusp-title">${u.title}</div>
      <div class="pusp-sub">${u.sub}</div>
    </div>`).join('');

  /* badges — centred via CSS justify-content:center */
  document.getElementById('p-footer').innerHTML = badges.map(b => `<span class="pf-badge">${b}</span>`).join('');
}

/* ═══════════ RENDER SIDEBAR ═══════════ */
const ICON_OPTS = Object.keys(ICONS).map(k => `<option value="${k}">${k}</option>`).join('');

function renderUsps() {
  document.getElementById('usp-list').innerHTML = usps.map((u,i) => `
    <div class="usp-row">
      <select onchange="usps[${i}].icon=this.value;render()">${ICONS[u.icon]?ICON_OPTS.replace(`value="${u.icon}"`,`value="${u.icon}" selected`):ICON_OPTS}</select>
      <div style="flex:1;display:flex;flex-direction:column;gap:4px;">
        <input value="${u.title}" placeholder="Title" oninput="usps[${i}].title=this.value;render()">
        <input class="sub" value="${u.sub}" placeholder="Subtitle" oninput="usps[${i}].sub=this.value;render()">
      </div>
      <button class="rmbtn" onclick="removeUsp(${i})" style="flex-shrink:0;">✕</button>
    </div>`).join('');
}

function renderBadges() {
  document.getElementById('badges-list').innerHTML = badges.map((b,i) => `
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;">
      <input value="${b}" style="flex:1;border:1.5px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;font-family:inherit;background:var(--soft);outline:none;color:var(--text);transition:border-color .15s;"
        oninput="badges[${i}]=this.value;render()"
        onfocus="this.style.borderColor='var(--blue)';this.style.boxShadow='0 0 0 3px rgba(21,159,203,.1)'"
        onblur="this.style.borderColor='var(--border)';this.style.boxShadow='none'">
      <button onclick="removeBadge(${i})" style="background:none;border:none;cursor:pointer;color:#c0cdd6;font-size:13px;flex-shrink:0;" onmouseover="this.style.color='#e05'" onmouseout="this.style.color='#c0cdd6'">✕</button>
    </div>`).join('');
}

function renderSlots() {
  document.getElementById('car-slots').innerHTML = cars.map((c,i) => `
    <div class="cslot">
      <div class="cslot-hd">
        <span class="cslot-num">Car ${i+1}</span>
        <div style="display:flex;align-items:center;gap:7px;">
          <span class="cslot-st ${c.img?'ok':''}">${c.img?'✓ Image set':'No image'}</span>
          <button class="rmbtn" onclick="removeCar(${i})">✕</button>
        </div>
      </div>
      <div class="r2">
        <div class="fg" style="margin:0 0 6px"><label>Name</label>
          <input value="${c.name}" placeholder="Car name" oninput="cars[${i}].name=this.value;render()"></div>
        <div class="fg" style="margin:0 0 6px"><label>Price</label>
          <input value="${c.price}" placeholder="1,299" oninput="cars[${i}].price=this.value;render()"></div>
      </div>
      <div class="r2">
        <div class="fg" style="margin:0"><label>Year</label>
          <input value="${c.year}" placeholder="2026" oninput="cars[${i}].year=this.value;render()"></div>
        <div class="fg" style="margin:0"><label>Type</label>
          <input value="${c.type}" placeholder="SUV/Sedan" oninput="cars[${i}].type=this.value;render()"></div>
      </div>
      <label class="upbtn ${c.img?'ok':''}" for="img-${i}">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        ${c.img?'Change image':'Upload image'}
      </label>
      <input type="file" accept="image/*" id="img-${i}" onchange="handleImg(${i},this)">
    </div>`).join('');
}

/* ═══════════ ACTIONS ═══════════ */
function addCar()       { cars.push({name:'',year:'2026',type:'',price:'',img:null}); renderSlots(); render(); }
function removeCar(i)   { if(cars.length<=1)return; cars.splice(i,1); renderSlots(); render(); }
function addBadge()     { badges.push('New badge'); renderBadges(); render(); }
function removeBadge(i) { badges.splice(i,1); renderBadges(); render(); }
function addUsp()       { usps.push({icon:'check',title:'Feature',sub:'Description'}); renderUsps(); render(); }
function removeUsp(i)   { if(usps.length<=1)return; usps.splice(i,1); renderUsps(); render(); }

function handleImg(i, input) {
  if (!input.files||!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => { cars[i].img = e.target.result; renderSlots(); render(); toast('Image uploaded ✓'); };
  reader.readAsDataURL(input.files[0]);
}

/* ═══════════════════════════════════════════════════
   DOWNLOAD — draw on <canvas> directly, no html2canvas
   This is the ONLY way to guarantee no stretching.
   We walk the poster DOM ourselves and paint each section.
═══════════════════════════════════════════════════ */
function downloadPoster() {
  const btn = document.getElementById('dl-btn');
  btn.disabled = true;
  btn.textContent = 'Generating…';

  // Give browser a frame to update UI
  requestAnimationFrame(() => setTimeout(() => {
    const poster = document.getElementById('poster');
    const scale  = 3; // output resolution multiplier

    // Measure the poster at its actual rendered size
    const rect = poster.getBoundingClientRect();
    const W = Math.round(rect.width);
    const H = Math.round(rect.height);

    const canvas = document.createElement('canvas');
    canvas.width  = W * scale;
    canvas.height = H * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);

    // --- WHITE BACKGROUND ---
    ctx.fillStyle = '#ffffff';
    ctx.roundRect(0, 0, W, H, 20);
    ctx.fill();

    // --- BACKGROUND DECORATION (soft circles) ---
    // large circle top-right
    const drawCircle = (cx,cy,r,color) => {
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.fillStyle = color; ctx.fill();
    };
    drawCircle(420, 80, 160, 'rgba(21,159,203,0.07)');
    drawCircle(430, 60,  90, 'rgba(21,159,203,0.06)');
    drawCircle( 30,H-40,100, 'rgba(21,159,203,0.04)');
    drawCircle( 10,H-20, 60, 'rgba(21,159,203,0.04)');
    // arc rings
    const drawRing = (cx,cy,r,color) => {
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.strokeStyle=color; ctx.lineWidth=1; ctx.stroke();
    };
    drawRing(440,30,120,'rgba(21,159,203,0.08)');
    drawRing(440,30,150,'rgba(21,159,203,0.05)');
    // dots
    [[60,30,2.5],[80,18,2],[95,35,1.5],[50,50,2],[110,22,1.5]].forEach(([x,y,r]) => {
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle='rgba(21,159,203,0.18)'; ctx.fill();
    });

    // --- USE html2canvas ONLY as a fallback renderer for text/layout ---
    // Better approach: render the poster element, but fix images before capture
    html2canvas(poster, {
      scale: scale,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      logging: false,
      imageTimeout: 15000,
      onclone: (clonedDoc) => {
        const clonedPoster = clonedDoc.getElementById('poster');
        // Force exact pixel dimensions — prevent any zoom/scroll artefacts
        clonedPoster.style.width  = W + 'px';
        clonedPoster.style.height = H + 'px';
        clonedPoster.style.position = 'fixed';
        clonedPoster.style.top = '0';
        clonedPoster.style.left = '0';
        clonedPoster.style.transform = 'none';
        clonedPoster.style.borderRadius = '0';
        clonedPoster.style.boxShadow = 'none';
        clonedPoster.style.overflow = 'hidden';

        // FIX IMAGES: replace each <img> with a canvas-rendered version
        // so object-fit:contain is baked in and cannot be misinterpreted
        const imgBoxes = clonedDoc.querySelectorAll('.pc-img');
        imgBoxes.forEach((box) => {
          const existingImg = box.querySelector('img');
          if (!existingImg) return;

          const boxW = 140; // approximate card image box width at 1x
          const boxH = 86;

          // Create a canvas to pre-render this image with correct aspect
          const c2 = document.createElement('canvas');
          c2.width  = boxW;
          c2.height = boxH;
          const cx2 = c2.getContext('2d');

          // Draw letterboxed (object-fit:contain equivalent)
          const tmpImg = new Image();
          tmpImg.src = existingImg.src;
          // draw synchronously — image is already decoded (base64)
          const iw = tmpImg.naturalWidth  || tmpImg.width  || boxW;
          const ih = tmpImg.naturalHeight || tmpImg.height || boxH;
          const scale2 = Math.min(boxW/iw, boxH/ih);
          const dw = iw*scale2, dh = ih*scale2;
          const dx = (boxW-dw)/2,  dy = (boxH-dh)/2;
          cx2.fillStyle='#f4f9fb'; cx2.fillRect(0,0,boxW,boxH);
          cx2.drawImage(tmpImg, dx, dy, dw, dh);

          // Replace img with the pre-rendered canvas
          const newImg = clonedDoc.createElement('img');
          newImg.src = c2.toDataURL('image/png');
          newImg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:fill;display:block;';
          existingImg.replaceWith(newImg);
        });
      }
    }).then(finalCanvas => {
      finalCanvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'invygo-car-grid.png';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 2000);
        btn.disabled = false;
        btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> Download PNG`;
        toast('Saved to Downloads ✓');
      }, 'image/png');
    }).catch(err => {
      console.error(err);
      btn.disabled = false;
      btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> Download PNG`;
      toast('Error — try again');
    });
  }, 80));
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}
